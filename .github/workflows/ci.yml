name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client
        run: pnpm build

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build image
        run: docker build -t flash-clip .

      - name: Smoke test
        run: |
          set -euo pipefail

          docker run -d --name flash-clip-test -p 3000:3000 flash-clip

          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/preview >/dev/null; then
              break
            fi
            sleep 1
          done

          curl -sf http://localhost:3000/api/preview >/dev/null

          curl -sf -X POST http://localhost:3000/api/paste \
            -H 'Content-Type: application/json' \
            -d '{"text":"test123456"}' \
            | grep -q 'tes\*\*\*\*\*\*\*\*\*\*'

          curl -sf http://localhost:3000/api/preview \
            | grep -q '"hasContent":true'

          curl -sf -X POST http://localhost:3000/api/copy \
            | grep -q 'test123456'

          response="$(curl -s -X POST http://localhost:3000/api/copy)"
          echo "$response" | grep -q 'nothing to copy'

          curl -sf http://localhost:3000/ \
            | grep -q 'FlashClip'

          docker stop flash-clip-test

  publish:
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
